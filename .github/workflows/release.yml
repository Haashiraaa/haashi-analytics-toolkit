name: Create Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v1.6.1)'
        required: true
        default: 'v1.6.1'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get tag version
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Extract changelog section
        run: |
          VERSION="${{ steps.tag.outputs.VERSION }}"
          VERSION_NUM="${VERSION#v}"

          echo "Looking for: $VERSION_NUM"
          echo "--- CHANGELOG.md headers ---"
          grep "^\#\#" CHANGELOG.md || echo "No ## headers found!"

          python3 - <<EOF
          import re

          version = "$VERSION_NUM"
          with open("CHANGELOG.md", "r") as f:
              content = f.read()

          # Match headers like: ## [v1.6.1] - 2026-04-24
          pattern = rf'(?m)^##\s+\[v?{re.escape(version)}\][^\n]*\n(.*?)(?=^##\s+\[v?[0-9]|\Z)'
          match = re.search(pattern, content, re.DOTALL)

          if match:
              body = match.group(1).strip()
              print(f"✅ Found changelog section for {version}")
              with open("extracted.md", "w") as f:
                  f.write(body)
          else:
              print(f"⚠️ No section found for {version}")
              with open("extracted.md", "w") as f:
                  f.write("See [CHANGELOG.md](./CHANGELOG.md) for full details.")
          EOF

          echo "--- Extracted ---"
          cat extracted.md

          echo "## $VERSION" > release_body.md
          echo "" >> release_body.md
          cat extracted.md >> release_body.md

          echo "--- Final body ---"
          cat release_body.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.VERSION }}
          body_path: release_body.md
          generate_release_notes: false
