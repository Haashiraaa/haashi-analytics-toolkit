



name: Create Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get tag version
        id: tag
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Extract changelog section
        run: |
          VERSION="${{ steps.tag.outputs.VERSION }}"
          VERSION_NUM="${VERSION#v}"

          echo "Looking for version: $VERSION_NUM in CHANGELOG.md"

          # Match headers like: [v1.6.1] - 2026-04-24
          # Extracts everything between this version and the next version header
          awk "
            /^\[v?${VERSION_NUM}\]/ { found=1; next }
            found && /^\[v?[0-9]+\.[0-9]+\.[0-9]+\]/ { exit }
            found { print }
          " CHANGELOG.md > extracted.md

          echo "--- Extracted content ---"
          cat extracted.md

          # Fallback if nothing found
          if [ ! -s extracted.md ]; then
            echo "⚠️ No changelog section found for $VERSION_NUM, using fallback"
            echo "See [CHANGELOG.md](./CHANGELOG.md) for full details." > extracted.md
          fi

          # Build final release body
          echo "## $VERSION" > release_body.md
          echo "" >> release_body.md
          cat extracted.md >> release_body.md

          echo "--- Final release body ---"
          cat release_body.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_body.md
          generate_release_notes: false

