name: Create Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get tag version
        id: tag
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Extract changelog section
        run: |
          VERSION="${{ steps.tag.outputs.VERSION }}"
          VERSION_NUM="${VERSION#v}"

          echo "Looking for: $VERSION_NUM"
          echo "--- CHANGELOG.md headers found ---"
          grep "^\[" CHANGELOG.md || echo "No headers found!"

          python3 - <<EOF
          import re, sys

          version = "$VERSION_NUM"
          with open("CHANGELOG.md", "r") as f:
              content = f.read()

          # Find section for this version
          pattern = rf'(?m)^\[v?{re.escape(version)}\][^\n]*\n(.*?)(?=^\[v?[0-9]|\Z)'
          match = re.search(pattern, content, re.DOTALL)

          if match:
              body = match.group(1).strip()
              print(f"✅ Found changelog section for {version}")
              with open("extracted.md", "w") as f:
                  f.write(body)
          else:
              print(f"⚠️ No section found for {version}")
              with open("extracted.md", "w") as f:
                  f.write(f"See [CHANGELOG.md](./CHANGELOG.md) for full details.")
          EOF

          echo "--- Extracted ---"
          cat extracted.md

          echo "## $VERSION" > release_body.md
          echo "" >> release_body.md
          cat extracted.md >> release_body.md

          echo "--- Final body ---"
          cat release_body.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_body.md
          generate_release_notes: false
