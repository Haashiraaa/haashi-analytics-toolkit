


name: Validate Changelog

on:
  push:
    tags:
      - 'v*'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check changelog entry exists
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          VERSION_NUM="${VERSION#v}"

          if ! grep -qE "^\[v?${VERSION_NUM}\]" CHANGELOG.md; then
            echo "No changelog entry found for $VERSION in CHANGELOG.md"
            echo "Please add a [${VERSION}] section to CHANGELOG.md before tagging."
            exit 1
          fi

          echo "Changelog entry found for $VERSION"

